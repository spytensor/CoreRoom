# CoreRoom project config. See https://github.com/spytensor/CoreRoom for docs.

# Engine used by any role that doesn't override.
# Options: "cc" (Claude Code), "codex", "gemini".
default_engine = "cc"

# Default model id; engine-specific (e.g. "opus" for cc, "o3" for codex).
# default_model = "opus"

# Default permission mode for tools: ask | auto | bypass.
permission_mode = "ask"

# Role that catches un-addressed text in the REPL.
host_role = "host"

# Each [roles.<name>] declares a role. The role's priors live at
# .coreroom/roles/<name>/priors.md. Add more by creating that file AND
# adding a table here. Empty tables inherit the defaults above.
# Optional identity fields:
# owner = "alice@example.com"
# authority = ["deployment", "infra", "secrets"]
[roles.host]
# engine = "cc"
# model = "opus"
# permission_mode = "ask"
